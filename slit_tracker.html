<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>Slit Thickness Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#4361ee; --primary-dk:#3a0ca3;
  --grad:linear-gradient(135deg,#4361ee 0%,#3a0ca3 100%);
  --bg:#f8fafc; --card-r:16px;
  --shadow:0 4px 20px -5px rgba(0,0,0,.10);
  --success:#10b981; --warn:#f59e0b; --danger:#ef4444;
}
*{box-sizing:border-box;}
body{background:var(--bg);font-family:'Sarabun',sans-serif;color:#1e293b;font-size:14px;padding-bottom:80px;overflow-x:hidden;}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Header ── */
.app-header{background:var(--grad);padding:14px 18px;color:white;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 16px rgba(67,97,238,.35);position:sticky;top:0;z-index:100;}
.app-header h1{font-family:'Kanit',sans-serif;font-size:1.05rem;font-weight:700;margin:0;}
.app-header small{font-size:.68rem;opacity:.8;}
.btn-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;
  border-radius:10px;padding:5px 12px;font-size:.8rem;font-weight:600;cursor:pointer;}
.btn-back:hover{background:rgba(255,255,255,.25);}

/* ── Container ── */
.page{max-width:680px;margin:0 auto;padding:0 0 20px;}

/* ── Search ── */
.search-card{background:white;border-radius:var(--card-r);box-shadow:var(--shadow);margin:14px;padding:14px;}
.search-card input{border-radius:10px 0 0 10px;border:2px solid #e2e8f0;font-size:.95rem;padding:10px 12px;}
.search-card input:focus{border-color:var(--primary);box-shadow:none;outline:none;}
.btn-search{background:var(--grad);color:white;border:none;border-radius:0 10px 10px 0;padding:0 20px;font-weight:700;font-size:.92rem;cursor:pointer;}
.btn-search:active{opacity:.85;}

/* ── Empty state ── */
.empty-state{text-align:center;padding:48px 20px;color:#94a3b8;}
.empty-state i{font-size:2.5rem;margin-bottom:12px;display:block;}
.empty-state p{font-size:.88rem;}

/* ── Mother Card ── */
.mother-card{background:white;border-radius:var(--card-r);box-shadow:var(--shadow);margin:0 14px 14px;overflow:hidden;}
.mother-hdr{background:var(--grad);padding:12px 16px;color:white;display:flex;justify-content:space-between;align-items:flex-start;}
.mother-jobid{font-family:'Kanit',sans-serif;font-size:1.05rem;font-weight:700;}
.mother-sub{font-size:.7rem;opacity:.85;margin-top:2px;}
.status-pill{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);border-radius:20px;
  padding:3px 10px;font-size:.68rem;font-weight:700;white-space:nowrap;margin-left:8px;}
.meta-grid{display:grid;grid-template-columns:repeat(4,1fr);padding:10px 14px;gap:6px;border-bottom:1px solid #f1f5f9;}
.meta-box{text-align:center;}
.meta-lbl{font-size:.58rem;color:#94a3b8;font-weight:700;text-transform:uppercase;}
.meta-val{font-size:.88rem;font-weight:700;color:#1e293b;}

/* Cross section */
.xs-area{padding:10px 14px 12px;background:#f8fafc;}
.xs-title{font-size:.65rem;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:6px;}
.xs-bar{display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid #e2e8f0;}
.xs-seg{display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:700;overflow:hidden;transition:filter .15s;cursor:default;}
.xs-scrap{background:#e2e8f0;color:#94a3b8;font-size:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;line-height:1.2;}
.xs-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.xs-leg-item{display:flex;align-items:center;gap:4px;font-size:.68rem;color:#64748b;}
.xs-leg-dot{width:9px;height:9px;border-radius:50%;}

/* ── Section title ── */
.sec-title{font-family:'Kanit',sans-serif;font-size:.78rem;font-weight:700;color:#64748b;text-transform:uppercase;
  letter-spacing:.04em;padding:2px 14px;margin-top:14px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:1px;background:#e2e8f0;}

/* ── Slit Cards ── */
.slit-card{background:white;border-radius:var(--card-r);box-shadow:var(--shadow);margin:8px 14px;
  overflow:hidden;border:2px solid transparent;transition:border-color .2s,box-shadow .2s;}
.slit-card.expanded{border-color:var(--primary);box-shadow:0 4px 20px rgba(67,97,238,.15);}
.slit-card-hdr{display:flex;align-items:center;padding:10px 14px;gap:8px;cursor:pointer;user-select:none;}
.slit-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.slit-name{font-family:'Kanit',sans-serif;font-weight:700;font-size:.88rem;flex:1;}
.badge-w{background:#f1f5f9;color:#475569;border-radius:8px;padding:2px 8px;font-size:.68rem;font-weight:700;}
.badge-st{border-radius:8px;padding:2px 8px;font-size:.65rem;font-weight:700;}
.chevron{color:#94a3b8;transition:transform .25s;font-size:.75rem;flex-shrink:0;}
.slit-card.expanded .chevron{transform:rotate(180deg);}

/* Heatmap */
.hm-wrap{padding:8px 14px 4px;}
.hm-axis{display:flex;justify-content:space-between;font-size:.6rem;color:#94a3b8;margin-bottom:3px;}
.hm-bar-outer{position:relative;height:24px;border-radius:6px;overflow:hidden;border:1px solid #e2e8f0;background:#e2e8f0;}
.hm-fill{position:absolute;top:0;left:0;height:100%;display:flex;}
.hm-seg{height:100%;}
/* marker line */
.hm-marker{position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,.35);z-index:2;transform:translateX(-50%);}
.hm-marker-lbl{position:absolute;bottom:-14px;font-size:.55rem;color:#475569;font-weight:700;transform:translateX(-50%);white-space:nowrap;}

/* Stats */
.stats-row{display:flex;gap:6px;padding:6px 14px 10px;}
.stat-chip{flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:5px 4px;text-align:center;}
.stat-lbl{font-size:.56rem;color:#94a3b8;text-transform:uppercase;font-weight:700;}
.stat-val{font-size:.82rem;font-weight:700;color:#1e293b;line-height:1.2;}

/* Expand panel */
.expand-panel{display:none;border-top:1px solid #e2e8f0;animation:fadeIn .2s;}
.slit-card.expanded .expand-panel{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}

/* Measurement list */
.mpt-list{padding:10px 14px 4px;}
.mpt-list-title{font-size:.65rem;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px;}

.mpt-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.mpt-hdr{display:flex;align-items:center;padding:7px 12px;gap:8px;background:white;border-bottom:1px solid #f1f5f9;}
.mpt-badge{background:var(--grad);color:white;border-radius:8px;padding:2px 10px;
  font-size:.75rem;font-weight:700;font-family:'Kanit',sans-serif;white-space:nowrap;}
.mpt-del{margin-left:auto;color:#ef4444;background:none;border:none;padding:2px 6px;font-size:.78rem;cursor:pointer;border-radius:6px;}
.mpt-del:hover{background:#fef2f2;}

/* T-inputs */
.t-inputs-wrap{padding:8px 12px;}
.t-col-hdr{display:flex;gap:5px;margin-bottom:4px;padding-left:0;}
.t-col-lbl{flex:1;text-align:center;font-size:.58rem;color:#94a3b8;font-weight:700;text-transform:uppercase;}
.t-row{display:flex;gap:5px;}
.t-input{flex:1;text-align:center;font-size:.88rem;font-weight:700;border:1.5px solid #e2e8f0;
  border-radius:8px;padding:7px 2px;background:white;transition:border-color .2s,background .2s;}
.t-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(67,97,238,.12);}
.t-input.ok{background:#f0fdf4;border-color:#86efac;color:#15803d;}
.t-input.over{background:#fef2f2;border-color:#fca5a5;color:#dc2626;}
.t-input.under{background:#fff7ed;border-color:#fdba74;color:#c2410c;}

/* Add point zone */
.add-pt-zone{padding:4px 14px 12px;}
.add-pt-title{font-size:.65rem;font-weight:700;color:#64748b;text-transform:uppercase;margin-bottom:8px;}
.add-pt-row{display:flex;gap:8px;align-items:center;}
.input-meter{flex:1;border:1.5px dashed #cbd5e1;border-radius:10px;padding:9px 12px;
  font-size:.92rem;background:#f8fafc;text-align:center;font-weight:700;}
.input-meter:focus{border-color:var(--primary);background:white;outline:none;border-style:solid;}
.btn-add-pt{background:var(--grad);color:white;border:none;border-radius:10px;padding:9px 16px;
  font-weight:700;font-size:.82rem;white-space:nowrap;cursor:pointer;}
.btn-add-pt:active{opacity:.85;}

/* Spec legend */
.spec-legend{display:flex;gap:8px;align-items:center;padding:4px 14px 8px;flex-wrap:wrap;}
.spec-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.spec-txt{font-size:.65rem;color:#64748b;}

/* Gradient bar */
.grad-row{display:flex;align-items:center;gap:6px;margin-top:3px;}
.grad-bar{flex:1;height:6px;border-radius:3px;background:linear-gradient(to right,#f97316,#facc15,#22c55e,#22c55e,#facc15,#ef4444);}
.grad-txt{font-size:.58rem;color:#94a3b8;white-space:nowrap;}

/* Save bar */
.save-bar{padding:10px 14px;background:#f8fafc;border-top:1px solid #e2e8f0;display:flex;gap:8px;}
.btn-save-slit{background:var(--grad);color:white;border:none;border-radius:10px;padding:9px;
  flex:1;font-weight:700;font-size:.9rem;cursor:pointer;}
.btn-save-slit:disabled{opacity:.5;cursor:not-allowed;}
.btn-save-slit:not(:disabled):active{opacity:.85;}

/* ── Profile Chart ── */
.chart-card{background:white;border-radius:var(--card-r);box-shadow:var(--shadow);margin:8px 14px;padding:14px;}
.chart-card-title{font-family:'Kanit',sans-serif;font-size:.82rem;font-weight:700;color:#334155;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.chart-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.chart-leg-item{display:flex;align-items:center;gap:4px;font-size:.65rem;color:#64748b;}
.chart-leg-dot{width:10px;height:10px;border-radius:2px;}

/* ── Toast ── */
#toast-container{position:fixed;top:20px;right:16px;z-index:9999;}
.my-toast{background:#10b981;color:white;padding:10px 16px;border-radius:10px;margin-bottom:8px;
  font-weight:700;font-size:.82rem;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:1;transition:opacity .5s;
  display:flex;align-items:center;gap:8px;}
.my-toast.error{background:#ef4444;}

/* ── FAB ── */
.fab{position:fixed;bottom:22px;right:18px;width:52px;height:52px;border-radius:50%;
  background:var(--grad);color:white;border:none;box-shadow:0 4px 16px rgba(67,97,238,.45);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;z-index:200;cursor:pointer;}
.fab:active{transform:scale(.93);}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div style="margin-top:12px;font-size:.82rem;color:#64748b;">กำลังโหลด...</div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- ── Header ── -->
<div class="app-header">
  <i class="fa-solid fa-film" style="font-size:1.15rem;flex-shrink:0;"></i>
  <div style="flex:1;">
    <h1>Slit Thickness Tracker</h1>
    <small>ติดตามความหนาฟิล์มซอยตามความยาว</small>
  </div>
  <button class="btn-back" onclick="window.history.back()">
    <i class="fa-solid fa-arrow-left me-1"></i>กลับ
  </button>
</div>

<div class="page">

<!-- ── Search ── -->
<div class="search-card">
  <label style="font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;display:block;margin-bottom:6px;">
    <i class="fa-solid fa-magnifying-glass me-1 text-primary"></i>ค้นหาด้วย Job ID
  </label>
  <div class="input-group">
    <input type="text" id="input-job-id" class="form-control"
           placeholder="พิมพ์ Job ID เช่น SM-2024-0312"
           onkeydown="if(event.key==='Enter') searchJob()">
    <button class="btn-search" onclick="searchJob()">ค้นหา</button>
  </div>
</div>

<!-- ── Empty state ── -->
<div id="empty-state" class="empty-state">
  <i class="fa-solid fa-film text-primary" style="opacity:.3;"></i>
  <p>พิมพ์ Job ID แล้วกดค้นหา<br>เพื่อดูฟิล์มซอยและบันทึกความหนา</p>
</div>

<!-- ── Main content (hidden until search) ── -->
<div id="main-content" style="display:none;">

  <!-- Mother Film Card -->
  <div class="mother-card" id="mother-card">
    <div class="mother-hdr">
      <div style="flex:1;">
        <div class="mother-jobid" id="m-jobid">—</div>
        <div class="mother-sub" id="m-sub">—</div>
      </div>
      <span class="status-pill" id="m-status">—</span>
    </div>
    <div class="meta-grid">
      <div class="meta-box"><div class="meta-lbl">Target Thk</div><div class="meta-val" id="m-thk">—</div></div>
      <div class="meta-box"><div class="meta-lbl">USL</div><div class="meta-val" style="color:var(--danger);" id="m-usl">—</div></div>
      <div class="meta-box"><div class="meta-lbl">LSL</div><div class="meta-val" style="color:var(--warn);" id="m-lsl">—</div></div>
      <div class="meta-box"><div class="meta-lbl">Slit</div><div class="meta-val" style="color:var(--primary);" id="m-slit-count">—</div></div>
    </div>
    <div class="xs-area">
      <div class="xs-title"><i class="fa-solid fa-ruler-horizontal me-1"></i>Cross-section</div>
      <div class="xs-bar" id="xs-bar"></div>
      <div class="xs-legend" id="xs-legend"></div>
    </div>
  </div>

  <!-- Section: Slit Strips -->
  <div class="sec-title"><i class="fa-solid fa-scissors text-primary"></i>Slit Strips</div>
  <div id="slit-cards-container"></div>

  <!-- Section: Overall Profile -->
  <div class="sec-title" id="chart-section-title" style="display:none;">
    <i class="fa-solid fa-chart-area text-primary"></i>ภาพรวมทุกเส้น
  </div>
  <div class="chart-card" id="chart-card" style="display:none;">
    <div class="chart-card-title">
      <i class="fa-solid fa-chart-area text-primary"></i>
      Thickness Profile — ทุกเส้น vs ระยะทาง (เมตร)
    </div>
    <div style="height:200px;"><canvas id="profile-chart"></canvas></div>
    <div class="chart-legend" id="chart-legend"></div>
  </div>

</div><!-- /main-content -->
</div><!-- /page -->

<!-- FAB Save All -->
<button class="fab" id="fab-save" style="display:none;" onclick="saveAllDirty()" title="บันทึกทั้งหมด">
  <i class="fa-solid fa-floppy-disk"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

<script>
// ============================================================
// CONFIG — เปลี่ยน GAS_URL ให้ตรงกับ deployment ของคุณ
// ============================================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbwcZesY-cNsIkfIIBhFIh4l1GHUyIo3rEKXjv2V3qCa594wqG7pve06I7mRrn74taoZ/exec";

// ============================================================
// COLORS
// ============================================================
const SLIT_COLORS = ['#4361ee','#7c3aed','#db2777','#059669','#d97706','#0891b2','#dc2626','#7c3aed'];

// ============================================================
// STATE
// ============================================================
let ALL_STANDARDS = [];
let CURRENT_JOB   = null;   // { jobId, customer, millPlan, thickness, status, slitPlan, stripWidth }
let CURRENT_SLITS = [];     // [{ slitId, width, color, note }]
let SLIT_DATA     = {};     // { slitId: { points: [{meter, t1, t2, t3}], dirty: bool } }
let SPEC          = { usl: null, lsl: null, target: null };
let profileChart  = null;

// ============================================================
// UTILS
// ============================================================
function showLoading(){ document.getElementById('loading').style.display='flex'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; }

function toast(msg, type='success'){
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `my-toast${type==='error'?' error':''}`;
  el.innerHTML = `<i class="fa-solid fa-${type==='error'?'circle-exclamation':'circle-check'}"></i> ${msg}`;
  c.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),500); },2800);
}

function callGAS(action, args, successCb, failCb){
  fetch(GAS_URL, {
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body: JSON.stringify({action, args: args||[]}),
    credentials:"omit"
  })
  .then(r=>r.json())
  .then(data=>{
    if(data && data.error){
      if(failCb) failCb(new Error(data.error));
      else Swal.fire("ข้อผิดพลาด",data.error,"error");
    } else {
      if(successCb) successCb(data.result);
    }
  })
  .catch(err=>{
    if(failCb) failCb(err);
    else Swal.fire("เชื่อมต่อล้มเหลว","โปรดตรวจสอบ GAS_URL หรืออินเทอร์เน็ต","error");
  });
}

// ============================================================
// INIT — โหลด Standards จาก GAS ครั้งเดียวตอนเปิดหน้า
// ============================================================
document.addEventListener('DOMContentLoaded', ()=>{
  showLoading();
  callGAS('getInitialData',[], data=>{
    ALL_STANDARDS = data.standards || [];
    hideLoading();
  }, ()=>hideLoading());
});

// ============================================================
// SEARCH
// ============================================================
function searchJob(){
  const jobId = document.getElementById('input-job-id').value.trim();
  if(!jobId) return Swal.fire("กรุณากรอก Job ID","","warning");

  showLoading();
  // ดึงข้อมูล Job จาก GAS พร้อมกัน 2 call
  callGAS('getInitialData',[], data=>{
    ALL_STANDARDS = data.standards || [];
    const job = (data.jobs||[]).find(j=> j.jobId.toLowerCase()===jobId.toLowerCase());
    if(!job){
      hideLoading();
      return Swal.fire("ไม่พบ Job","ไม่พบ Job ID: "+jobId,"info");
    }
    CURRENT_JOB = job;

    // ดึง Slit Inventory
    callGAS('getSlitsByParent',[job.jobId], slits=>{
      hideLoading();
      CURRENT_SLITS = buildSlitsFromJob(job, slits||[]);
      resolveSpec(job);
      initSlitData();
      renderAll();
    }, ()=>{
      // fallback: สร้าง slits จาก slitPlan ถ้า API ไม่มี
      hideLoading();
      CURRENT_SLITS = buildSlitsFromJob(job, []);
      resolveSpec(job);
      initSlitData();
      renderAll();
    });
  }, ()=>{ hideLoading(); Swal.fire("เชื่อมต่อล้มเหลว","","error"); });
}

// สร้าง slit list จาก Job + Slit_Inventory
function buildSlitsFromJob(job, invSlits){
  const plan = String(job.slitPlan||'').replace(/^'/,'').trim();
  if(!plan) return [];

  const items = plan.split(',').map((item,i)=>{
    const wm = item.match(/^([0-9.]+)/);
    const nm = item.match(/\[(.*?)\]/);
    return {
      slitId: `${job.jobId}-S${i+1}`,
      width:  wm ? parseFloat(wm[1]) : 0,
      note:   nm ? nm[1] : '',
      color:  SLIT_COLORS[i % SLIT_COLORS.length]
    };
  }).filter(s=>s.width>0);

  // ถ้ามี Slit_Inventory ให้ใช้ slitId จริง
  if(invSlits.length > 0){
    items.forEach((s,i)=>{
      if(invSlits[i]) s.slitId = invSlits[i].slitId || s.slitId;
    });
  }
  return items;
}

// หา Spec จาก Standards
function resolveSpec(job){
  SPEC = { usl: null, lsl: null, target: parseFloat(job.thickness)||0 };
  const millKey = String(job.millPlan||'').toUpperCase().split('-')[0].trim();
  const keyMap  = {SA:'sa',GJ:'gj',GS:'gs',BSP:'bsp'};
  const col     = keyMap[millKey];
  const thkFixed = parseFloat(job.thickness).toFixed(2);

  for(const s of ALL_STANDARDS){
    let match = false;
    if(col && parseFloat(s[col]).toFixed(2)===thkFixed) match=true;
    if(!match && parseFloat(s.thick).toFixed(2)===thkFixed) match=true;
    if(match && s.max>0){
      SPEC.usl = s.max;
      SPEC.lsl = s.min;
      break;
    }
  }
}

// Init SLIT_DATA — โหลดข้อมูลที่เคยบันทึกไว้
function initSlitData(){
  SLIT_DATA = {};
  CURRENT_SLITS.forEach(s=>{
    SLIT_DATA[s.slitId] = { points:[], dirty:false };
  });

  // โหลดข้อมูลที่เคยบันทึกจาก GAS
  callGAS('getSlitThicknessLog',[CURRENT_JOB.jobId], rows=>{
    if(!rows||!rows.length) return;
    rows.forEach(r=>{
      if(SLIT_DATA[r.slitId]){
        SLIT_DATA[r.slitId].points.push({
          meter: parseFloat(r.meter),
          t1: parseFloat(r.t1)||null,
          t2: parseFloat(r.t2)||null,
          t3: parseFloat(r.t3)||null
        });
      }
    });
    // sort by meter
    Object.keys(SLIT_DATA).forEach(id=>{
      SLIT_DATA[id].points.sort((a,b)=>a.meter-b.meter);
    });
    renderSlitCards();
    renderProfileChart();
  }, ()=>{}); // ถ้า API ยังไม่มีก็ข้าม
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll(){
  document.getElementById('empty-state').style.display  = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('fab-save').style.display     = 'flex';
  renderMotherCard();
  renderSlitCards();
  renderProfileChart();
}

// ── Mother Card ──────────────────────────────────────────────
function renderMotherCard(){
  const j = CURRENT_JOB;
  document.getElementById('m-jobid').innerHTML = `<i class="fa-solid fa-film me-2"></i>${j.jobId}`;
  document.getElementById('m-sub').textContent = `${j.customer} | Mill: ${j.millPlan}`;

  const statusMap = {Running:'🟢 Running', Waiting:'🟡 Waiting', Finished:'✅ Finished'};
  document.getElementById('m-status').textContent = statusMap[j.status]||j.status;
  document.getElementById('m-thk').textContent    = `${parseFloat(j.thickness).toFixed(2)} mm`;
  document.getElementById('m-usl').textContent    = SPEC.usl ? SPEC.usl.toFixed(3) : '—';
  document.getElementById('m-lsl').textContent    = SPEC.lsl ? SPEC.lsl.toFixed(3) : '—';
  document.getElementById('m-slit-count').textContent = CURRENT_SLITS.length+' เส้น';

  // Cross-section bar
  const sw  = parseFloat(j.stripWidth)||0;
  const tot = CURRENT_SLITS.reduce((s,x)=>s+x.width,0);
  const bar = document.getElementById('xs-bar');
  const leg = document.getElementById('xs-legend');
  bar.innerHTML=''; leg.innerHTML='';

  CURRENT_SLITS.forEach(s=>{
    const pct = sw>0 ? (s.width/sw*100).toFixed(1) : (s.width/tot*100).toFixed(1);
    const seg = document.createElement('div');
    seg.className='xs-seg';
    seg.style.cssText=`width:${pct}%;background:${s.color};`;
    seg.textContent = s.width+'';
    seg.title = `${s.slitId} — ${s.width} mm`;
    bar.appendChild(seg);

    const li = document.createElement('div');
    li.className='xs-leg-item';
    li.innerHTML=`<div class="xs-leg-dot" style="background:${s.color};"></div><span>${s.slitId} (${s.width}mm)</span>`;
    leg.appendChild(li);
  });

  if(sw>0 && tot<sw){
    const scrapPct = ((sw-tot)/sw*100).toFixed(1);
    const sc=document.createElement('div');
    sc.className='xs-scrap';
    sc.style.width=scrapPct+'%';
    sc.innerHTML=`scrap<br>${(sw-tot).toFixed(0)}mm`;
    bar.appendChild(sc);
  }
}

// ── Slit Cards ───────────────────────────────────────────────
function renderSlitCards(){
  const container = document.getElementById('slit-cards-container');
  container.innerHTML='';
  CURRENT_SLITS.forEach(s=> container.appendChild(buildSlitCard(s)));
}

function buildSlitCard(slit){
  const sd    = SLIT_DATA[slit.slitId] || {points:[],dirty:false};
  const pts   = sd.points;
  const hasData = pts.length>0;

  // Compute stats
  let allVals=[], outCount=0;
  pts.forEach(p=>{
    [p.t1,p.t2,p.t3].forEach(v=>{
      if(v===null||v===undefined) return;
      allVals.push(v);
      if(SPEC.usl&&v>SPEC.usl) outCount++;
      if(SPEC.lsl&&v<SPEC.lsl) outCount++;
    });
  });
  const avg = allVals.length ? (allVals.reduce((a,b)=>a+b,0)/allVals.length).toFixed(3) : '—';
  const mn  = allVals.length ? Math.min(...allVals).toFixed(3) : '—';
  const mx  = allVals.length ? Math.max(...allVals).toFixed(3) : '—';

  const card = document.createElement('div');
  card.className = 'slit-card';
  card.id = `card-${slit.slitId}`;

  // Status badge
  const badgeSt = hasData
    ? `<span class="badge-st" style="background:#dcfce7;color:#16a34a;">มีข้อมูล ${pts.length} จุด</span>`
    : `<span class="badge-st" style="background:#f1f5f9;color:#94a3b8;">ยังไม่มีข้อมูล</span>`;

  // Heatmap HTML
  const hmHtml = buildHeatmapHtml(slit, pts);

  // Measurement points HTML
  const mptHtml = pts.map((p,i)=> buildMptItemHtml(slit.slitId, p, i)).join('');

  card.innerHTML = `
    <div class="slit-card-hdr" onclick="toggleCard('${slit.slitId}')">
      <div class="slit-dot" style="background:${slit.color};"></div>
      <div class="slit-name">${slit.slitId}</div>
      <span class="badge-w">${slit.width} mm</span>
      ${badgeSt}
      <i class="fa-solid fa-chevron-down chevron"></i>
    </div>

    ${hmHtml}

    <div class="stats-row">
      <div class="stat-chip"><div class="stat-lbl">จุดวัด</div><div class="stat-val">${pts.length}</div></div>
      <div class="stat-chip"><div class="stat-lbl">เฉลี่ย</div><div class="stat-val">${avg}</div></div>
      <div class="stat-chip"><div class="stat-lbl">Min</div><div class="stat-val" style="${mn!=='—'&&SPEC.lsl&&parseFloat(mn)<SPEC.lsl?'color:var(--warn);':''}">${mn}</div></div>
      <div class="stat-chip"><div class="stat-lbl">Max</div><div class="stat-val" style="${mx!=='—'&&SPEC.usl&&parseFloat(mx)>SPEC.usl?'color:var(--danger);':''}">${mx}</div></div>
      <div class="stat-chip"><div class="stat-lbl">Out</div><div class="stat-val" style="${outCount>0?'color:var(--danger);':''}">${outCount}</div></div>
    </div>

    <div class="expand-panel">
      <div class="mpt-list">
        <div class="mpt-list-title"><i class="fa-solid fa-map-pin me-1 text-primary"></i>จุดวัดที่บันทึก</div>
        <div id="mpt-list-${slit.slitId}">${mptHtml || '<div style="font-size:.75rem;color:#94a3b8;text-align:center;padding:10px 0;">ยังไม่มีจุดวัด — เพิ่มด้านล่างได้เลยครับ</div>'}</div>
      </div>

      <div class="add-pt-zone">
        <div class="add-pt-title"><i class="fa-solid fa-circle-plus me-1 text-success"></i>เพิ่มจุดวัดใหม่</div>
        <div class="add-pt-row">
          <input type="number" class="input-meter" id="input-meter-${slit.slitId}"
                 placeholder="ระยะทาง (เมตร)" min="0" step="0.1"
                 onkeydown="if(event.key==='Enter') addMeasurePoint('${slit.slitId}')">
          <button class="btn-add-pt" onclick="addMeasurePoint('${slit.slitId}')">
            <i class="fa-solid fa-plus me-1"></i>เพิ่มจุด
          </button>
        </div>
      </div>

      <div class="spec-legend">
        <div class="spec-dot" style="background:#22c55e;"></div><span class="spec-txt">In Spec</span>
        <div class="spec-dot" style="background:#ef4444;"></div><span class="spec-txt">Over USL (${SPEC.usl||'—'})</span>
        <div class="spec-dot" style="background:#f97316;"></div><span class="spec-txt">Under LSL (${SPEC.lsl||'—'})</span>
      </div>

      <div class="save-bar">
        <button class="btn-save-slit" id="btn-save-${slit.slitId}"
                onclick="saveOneSlit('${slit.slitId}')"
                ${sd.dirty?'':'disabled'}>
          <i class="fa-solid fa-floppy-disk me-1"></i>บันทึก ${slit.slitId}
        </button>
      </div>
    </div>
  `;
  return card;
}

// ── Heatmap ──────────────────────────────────────────────────
function buildHeatmapHtml(slit, pts){
  if(!pts.length){
    return `
      <div class="hm-wrap">
        <div class="hm-bar-outer" style="background:#e2e8f0;">
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#94a3b8;">
            <i class="fa-solid fa-circle-plus me-1"></i> เพิ่มจุดวัดเพื่อดู heatmap
          </div>
        </div>
      </div>`;
  }

  const maxM = Math.max(...pts.map(p=>p.meter), 1);
  // สร้าง color segments interpolate ระหว่างจุด
  let segsHtml = '';
  let markersHtml = '';

  pts.forEach((p,i)=>{
    const avgV = [p.t1,p.t2,p.t3].filter(v=>v!==null&&v!==undefined);
    const v = avgV.length ? avgV.reduce((a,b)=>a+b,0)/avgV.length : null;
    const pct = (p.meter/maxM*100).toFixed(2);
    const color = v===null ? '#e2e8f0' : getThkColor(v);

    // segment จนถึงจุดถัดไป
    const nextM = i<pts.length-1 ? pts[i+1].meter : maxM;
    const segW  = ((nextM-p.meter)/maxM*100).toFixed(2);
    if(parseFloat(segW)>0){
      segsHtml += `<div class="hm-seg" style="width:${segW}%;background:${color};"></div>`;
    }

    // marker
    markersHtml += `
      <div class="hm-marker" style="left:${pct}%;" title="${p.meter}m"></div>
      <div class="hm-marker-lbl" style="left:${pct}%;">${p.meter}m</div>`;
  });

  const axisLeft  = '0 m';
  const axisRight = maxM+' m';

  return `
    <div class="hm-wrap">
      <div class="hm-axis"><span>${axisLeft}</span><span>${axisRight}</span></div>
      <div class="hm-bar-outer">
        <div class="hm-fill">${segsHtml}</div>
        ${markersHtml}
      </div>
      <div class="grad-row">
        <span class="grad-txt">LSL</span>
        <div class="grad-bar"></div>
        <span class="grad-txt">USL</span>
      </div>
    </div>`;
}

function getThkColor(v){
  if(!SPEC.usl||!SPEC.lsl) return '#22c55e';
  const target = SPEC.target || (SPEC.usl+SPEC.lsl)/2;
  const range  = SPEC.usl - target;
  if(range<=0) return '#22c55e';
  const dev = (v-target)/range; // -1..1
  if(dev > 0.85) return '#ef4444';
  if(dev > 0.5)  return '#f97316';
  if(dev > 0.2)  return '#facc15';
  if(dev < -0.85) return '#3b82f6';
  if(dev < -0.5)  return '#60a5fa';
  return '#22c55e';
}

// ── Measurement Point HTML ───────────────────────────────────
function buildMptItemHtml(slitId, p, idx){
  const fmtInput = (v, field)=>{
    const cls = getInputClass(v);
    const val = (v!==null&&v!==undefined) ? v : '';
    return `<input class="t-input ${cls}" type="number" step="0.001"
              value="${val}" placeholder="--"
              data-slit="${slitId}" data-idx="${idx}" data-field="${field}"
              oninput="onThkInput(this)">`;
  };
  return `
    <div class="mpt-item" id="mpt-${slitId}-${idx}">
      <div class="mpt-hdr">
        <span class="mpt-badge">${p.meter} m</span>
        <button class="mpt-del" onclick="deleteMptItem('${slitId}',${idx})">
          <i class="fa-solid fa-trash-can"></i>
        </button>
      </div>
      <div class="t-inputs-wrap">
        <div class="t-col-hdr">
          <div class="t-col-lbl">T1 (ซ้าย)</div>
          <div class="t-col-lbl">T2 (กลาง)</div>
          <div class="t-col-lbl">T3 (ขวา)</div>
        </div>
        <div class="t-row">
          ${fmtInput(p.t1,'t1')}
          ${fmtInput(p.t2,'t2')}
          ${fmtInput(p.t3,'t3')}
        </div>
      </div>
    </div>`;
}

function getInputClass(v){
  if(v===null||v===undefined||v==='') return '';
  const n = parseFloat(v);
  if(isNaN(n)) return '';
  if(SPEC.usl && n>SPEC.usl) return 'over';
  if(SPEC.lsl && n<SPEC.lsl) return 'under';
  return 'ok';
}

// ============================================================
// INTERACTIONS
// ============================================================
function toggleCard(slitId){
  const card = document.getElementById(`card-${slitId}`);
  card.classList.toggle('expanded');
}

function addMeasurePoint(slitId){
  const inp = document.getElementById(`input-meter-${slitId}`);
  const m   = parseFloat(inp.value);
  if(isNaN(m)||m<0) return Swal.fire("กรุณากรอกระยะทาง","ระยะทางต้องเป็นตัวเลขที่มากกว่าหรือเท่ากับ 0","warning");

  const sd = SLIT_DATA[slitId];
  if(sd.points.find(p=>p.meter===m)){
    return Swal.fire("ระยะทางซ้ำ","มีจุดวัดที่ "+m+" m อยู่แล้ว","warning");
  }

  sd.points.push({meter:m, t1:null, t2:null, t3:null});
  sd.points.sort((a,b)=>a.meter-b.meter);
  sd.dirty = true;
  inp.value = '';
  refreshCard(slitId);
  // scroll to card
  setTimeout(()=>document.getElementById(`mpt-${slitId}-${sd.points.findIndex(p=>p.meter===m)}`).scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function deleteMptItem(slitId, idx){
  const sd = SLIT_DATA[slitId];
  sd.points.splice(idx,1);
  sd.dirty = true;
  refreshCard(slitId);
}

function onThkInput(el){
  const slitId = el.dataset.slit;
  const idx    = parseInt(el.dataset.idx);
  const field  = el.dataset.field;
  const v      = el.value==='' ? null : parseFloat(el.value);

  SLIT_DATA[slitId].points[idx][field] = isNaN(v)?null:v;
  SLIT_DATA[slitId].dirty = true;

  // Update input color
  el.className = 't-input ' + getInputClass(v);
  // Enable save button
  const btn = document.getElementById(`btn-save-${slitId}`);
  if(btn) btn.disabled = false;
}

function refreshCard(slitId){
  const slit = CURRENT_SLITS.find(s=>s.slitId===slitId);
  if(!slit) return;
  const oldCard = document.getElementById(`card-${slitId}`);
  const wasExpanded = oldCard.classList.contains('expanded');
  const newCard = buildSlitCard(slit);
  if(wasExpanded) newCard.classList.add('expanded');
  oldCard.replaceWith(newCard);
  renderProfileChart();
}

// ============================================================
// SAVE
// ============================================================
function saveOneSlit(slitId){
  const sd   = SLIT_DATA[slitId];
  const rows = sd.points.map(p=>({
    slitId,
    parentId: CURRENT_JOB.jobId,
    meter: p.meter,
    t1: p.t1??'',
    t2: p.t2??'',
    t3: p.t3??''
  }));

  const btn = document.getElementById(`btn-save-${slitId}`);
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin me-1"></i>กำลังบันทึก...'; }

  callGAS('saveSlitThicknessLog',[CURRENT_JOB.jobId, slitId, rows], res=>{
    sd.dirty = false;
    if(btn){ btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-floppy-disk me-1"></i>บันทึกแล้ว ✓'; }
    toast(`บันทึก ${slitId} สำเร็จ`);
    refreshCard(slitId);
  }, ()=>{
    if(btn){ btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-floppy-disk me-1"></i>บันทึก '+slitId; }
    toast('บันทึกล้มเหลว','error');
  });
}

function saveAllDirty(){
  const dirtySlits = Object.keys(SLIT_DATA).filter(id=>SLIT_DATA[id].dirty);
  if(!dirtySlits.length) return toast('ไม่มีข้อมูลที่ต้องบันทึก');
  dirtySlits.forEach(id=> saveOneSlit(id));
}

// ============================================================
// PROFILE CHART
// ============================================================
function renderProfileChart(){
  const hasAny = CURRENT_SLITS.some(s=>(SLIT_DATA[s.slitId]?.points||[]).length>0);
  const chartSec   = document.getElementById('chart-section-title');
  const chartCard  = document.getElementById('chart-card');
  chartSec.style.display  = hasAny ? 'flex' : 'none';
  chartCard.style.display = hasAny ? 'block' : 'none';
  if(!hasAny) return;

  const datasets = [];
  CURRENT_SLITS.forEach(s=>{
    const pts = (SLIT_DATA[s.slitId]?.points||[]).filter(p=>p.t2!==null);
    if(!pts.length) return;
    datasets.push({
      label: `${s.slitId} T2`,
      data:  pts.map(p=>({x:p.meter, y:p.t2})),
      borderColor: s.color, backgroundColor: s.color+'22',
      tension:.35, pointRadius:5, fill:false
    });
    // T1/T3 as dashed
    ['t1','t3'].forEach((f,fi)=>{
      const dpts = (SLIT_DATA[s.slitId]?.points||[]).filter(p=>p[f]!==null);
      if(!dpts.length) return;
      datasets.push({
        label:`${s.slitId} ${f.toUpperCase()}`,
        data: dpts.map(p=>({x:p.meter,y:p[f]})),
        borderColor: s.color+'99', borderDash:[4,3],
        tension:.35, pointRadius:3, fill:false, borderWidth:1.5
      });
    });
  });

  // Spec lines
  const allMeters = CURRENT_SLITS.flatMap(s=>(SLIT_DATA[s.slitId]?.points||[]).map(p=>p.meter));
  if(allMeters.length && SPEC.usl){
    const xMin=Math.min(...allMeters), xMax=Math.max(...allMeters);
    [['USL',SPEC.usl],['LSL',SPEC.lsl]].forEach(([lbl,val])=>{
      datasets.push({
        label:`${lbl} (${val})`,
        data:[{x:xMin,y:val},{x:xMax,y:val}],
        borderColor:'#ef4444', borderDash:[6,4],
        borderWidth:1.5, pointRadius:0, fill:false
      });
    });
  }

  if(profileChart) profileChart.destroy();
  profileChart = new Chart(
    document.getElementById('profile-chart').getContext('2d'),
    {
      type:'line',
      data:{datasets},
      options:{
        responsive:true, maintainAspectRatio:false, parsing:false,
        plugins:{
          legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},
            filter:item=>!item.text.match(/T1|T3/)}},
          tooltip:{callbacks:{title:ctx=>`${ctx[0].parsed.x} m`,
            label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(3)} mm`}}
        },
        scales:{
          x:{type:'linear',
            title:{display:true,text:'ระยะทาง (เมตร)',font:{size:10}},
            ticks:{font:{size:10}}},
          y:{
            title:{display:true,text:'ความหนา (mm)',font:{size:10}},
            ticks:{font:{size:10},callback:v=>v.toFixed(3)},
            suggestedMin: SPEC.lsl ? SPEC.lsl-0.05 : undefined,
            suggestedMax: SPEC.usl ? SPEC.usl+0.05 : undefined
          }
        }
      }
    }
  );

  // Legend
  const leg = document.getElementById('chart-legend');
  leg.innerHTML = CURRENT_SLITS.map(s=>{
    const hasData = (SLIT_DATA[s.slitId]?.points||[]).length>0;
    return `<div class="chart-leg-item" style="${hasData?'':'opacity:.4;}">
      <div class="chart-leg-dot" style="background:${s.color};"></div>
      <span>${s.slitId} (${s.width}mm)</span>
    </div>`;
  }).join('');
}
</script>
